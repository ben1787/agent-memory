name: release

# Build self-contained agent-memory binaries for every supported platform when
# a `v*` tag is pushed, then attach them to a GitHub Release. The shell
# installer (install.sh) and `agent-memory upgrade` both download from these
# release artifacts, so this workflow is the source of truth for distribution.
#
# To cut a new release:
#   git tag vX.Y.Z
#   git push --tags
#
# The workflow handles the rest: build matrix → checksums → release upload.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-14
            asset_suffix: macos-arm64
            archive_ext: tar.gz
          # macos-x86_64 dropped: GitHub retired the free `macos-13` runner
          # image ("configuration 'macos-13-us-default' is not supported"),
          # and cross-compiling Intel binaries from the arm64 runner is not
          # worth the complexity for a dying architecture. Intel Mac users
          # can run the arm64 binary under Rosetta is NOT true — they'd need
          # to build from source via `uv tool install git+https://github.com/ben1787/agent-memory`.
          - target: linux-x86_64
            runner: ubuntu-22.04
            asset_suffix: linux-x86_64
            archive_ext: tar.gz
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            asset_suffix: linux-arm64
            archive_ext: tar.gz
          - target: windows-x86_64
            runner: windows-2022
            asset_suffix: windows-x86_64
            archive_ext: zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python via uv
        run: uv python install 3.11

      - name: Install build dependencies
        # `uv sync --group dev` creates .venv AND installs the project + the
        # `[dependency-groups] dev` block from pyproject.toml. The earlier
        # `-e ".[dev]"` form silently dropped pytest because PEP 621 extras
        # and PEP 735 dependency groups are different things.
        run: |
          uv sync --group dev
          uv pip install --python .venv pyinstaller

      - name: Strip CUDA libs on Linux
        # On Linux, `pip install onnxruntime` (a transitive dep of fastembed)
        # bundles ~2.4 GB of nvidia-* CUDA runtime wheels (cublas, cudnn,
        # cufft, curand, cusolver, cusparse, nccl, nvjitlink, nvtx) even though
        # we never invoke a GPU execution provider. Without stripping them the
        # PyInstaller bundle is 2.5 GB, which exceeds GitHub's 2 GiB per-asset
        # release limit. macOS arm64 / Windows don't have this problem because
        # there are no CUDA wheels for those platforms.
        if: runner.os == 'Linux'
        shell: bash
        run: |
          source .venv/bin/activate
          python -m pip uninstall -y \
            nvidia-cublas-cu12 \
            nvidia-cuda-cupti-cu12 \
            nvidia-cuda-nvrtc-cu12 \
            nvidia-cuda-runtime-cu12 \
            nvidia-cudnn-cu12 \
            nvidia-cufft-cu12 \
            nvidia-curand-cu12 \
            nvidia-cusolver-cu12 \
            nvidia-cusparse-cu12 \
            nvidia-cusparselt-cu12 \
            nvidia-nccl-cu12 \
            nvidia-nvjitlink-cu12 \
            nvidia-nvtx-cu12 \
            triton \
            || true

      - name: Run tests before building binary
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m pytest tests/ -q

      - name: Build binary
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          pyinstaller pyinstaller/agent-memory.spec --clean --noconfirm
          # Print bundle size so future-us can spot bloat regressions in the
          # workflow log without spelunking through artifacts. GitHub's
          # per-release-asset limit is 2 GiB.
          du -sh dist/agent-memory 2>/dev/null || true

      - name: Smoke-test the binary
        shell: bash
        run: |
          # onedir layout: dist/agent-memory/agent-memory[.exe]
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./dist/agent-memory/agent-memory.exe --version
            ./dist/agent-memory/agent-memory.exe --help > /dev/null
          else
            ./dist/agent-memory/agent-memory --version
            ./dist/agent-memory/agent-memory --help > /dev/null
          fi

      - name: Stage release archive + checksum
        shell: bash
        run: |
          mkdir -p release-artifacts
          ARCHIVE="agent-memory-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            # Windows: use built-in PowerShell zip via 7z or python.
            if command -v 7z >/dev/null; then
              7z a -tzip "release-artifacts/${ARCHIVE}" "./dist/agent-memory/*"
            else
              python -c "import shutil; shutil.make_archive('release-artifacts/agent-memory-${{ matrix.asset_suffix }}', 'zip', 'dist', 'agent-memory')"
            fi
          else
            tar -czf "release-artifacts/${ARCHIVE}" -C dist agent-memory
          fi
          cd release-artifacts
          if command -v sha256sum >/dev/null; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: agent-memory-${{ matrix.asset_suffix }}
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums summary
        run: |
          cd release-artifacts
          ls -la
          cat *.sha256 > SHA256SUMS.txt || true
          cat SHA256SUMS.txt || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
