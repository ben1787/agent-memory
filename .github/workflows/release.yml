name: release

# Build self-contained agent-memory binaries for every supported platform when
# a `v*` tag is pushed, then attach them to a GitHub Release. The shell
# installer (install.sh) and Homebrew formula both download from these release
# artifacts, so this workflow is the source of truth for distribution.
#
# To cut a new release:
#   git tag vX.Y.Z
#   git push --tags
#
# The workflow handles the rest: build matrix → checksums → release upload →
# Homebrew formula bump (in a separate tap repo).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-14
            asset_suffix: macos-arm64
            archive_ext: tar.gz
          - target: macos-x86_64
            runner: macos-13
            asset_suffix: macos-x86_64
            archive_ext: tar.gz
          - target: linux-x86_64
            runner: ubuntu-22.04
            asset_suffix: linux-x86_64
            archive_ext: tar.gz
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            asset_suffix: linux-arm64
            archive_ext: tar.gz
          - target: windows-x86_64
            runner: windows-2022
            asset_suffix: windows-x86_64
            archive_ext: zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python via uv
        run: uv python install 3.11

      - name: Install build dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv -e ".[dev]"
          uv pip install --python .venv pyinstaller

      - name: Run tests before building binary
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m pytest tests/ -q

      - name: Build binary
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          pyinstaller pyinstaller/agent-memory.spec --clean --noconfirm

      - name: Smoke-test the binary
        shell: bash
        run: |
          # onedir layout: dist/agent-memory/agent-memory[.exe]
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./dist/agent-memory/agent-memory.exe --version
            ./dist/agent-memory/agent-memory.exe --help > /dev/null
          else
            ./dist/agent-memory/agent-memory --version
            ./dist/agent-memory/agent-memory --help > /dev/null
          fi

      - name: Stage release archive + checksum
        shell: bash
        run: |
          mkdir -p release-artifacts
          ARCHIVE="agent-memory-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            # Windows: use built-in PowerShell zip via 7z or python.
            if command -v 7z >/dev/null; then
              7z a -tzip "release-artifacts/${ARCHIVE}" "./dist/agent-memory/*"
            else
              python -c "import shutil; shutil.make_archive('release-artifacts/agent-memory-${{ matrix.asset_suffix }}', 'zip', 'dist', 'agent-memory')"
            fi
          else
            tar -czf "release-artifacts/${ARCHIVE}" -C dist agent-memory
          fi
          cd release-artifacts
          if command -v sha256sum >/dev/null; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: agent-memory-${{ matrix.asset_suffix }}
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums summary
        run: |
          cd release-artifacts
          ls -la
          cat *.sha256 > SHA256SUMS.txt || true
          cat SHA256SUMS.txt || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  bump-homebrew-tap:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-22.04
    # Skip on prerelease tags (vX.Y.Z-rc.N etc) — only bump tap on real releases.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      # GitHub Actions does not allow `secrets.*` in job-level `if` expressions,
      # so we check for the secret inside a step and gate everything else on
      # the output. This makes the first release succeed cleanly even if you
      # have not yet configured HOMEBREW_TAP_TOKEN — see docs/RELEASING.md.
      - name: Check tap token presence
        id: check
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping homebrew tap bump. See docs/RELEASING.md to enable."
          fi

      - name: Checkout tap repo
        if: steps.check.outputs.has_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download macos-arm64 artifact for sha256
        if: steps.check.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          name: agent-memory-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macos-x86_64 artifact for sha256
        if: steps.check.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          name: agent-memory-macos-x86_64
          path: artifacts/macos-x86_64

      - name: Download linux-x86_64 artifact for sha256
        if: steps.check.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          name: agent-memory-linux-x86_64
          path: artifacts/linux-x86_64

      - name: Download linux-arm64 artifact for sha256
        if: steps.check.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          name: agent-memory-linux-arm64
          path: artifacts/linux-arm64

      - name: Compute version + checksums
        id: meta
        if: steps.check.outputs.has_token == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          for target in macos-arm64 macos-x86_64 linux-x86_64 linux-arm64; do
            sha=$(awk '{print $1}' "artifacts/${target}/agent-memory-${target}.tar.gz.sha256")
            echo "sha_${target//-/_}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Render formula
        if: steps.check.outputs.has_token == 'true'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_MAC_ARM: ${{ steps.meta.outputs.sha_macos_arm64 }}
          SHA_MAC_X86: ${{ steps.meta.outputs.sha_macos_x86_64 }}
          SHA_LINUX_X86: ${{ steps.meta.outputs.sha_linux_x86_64 }}
          SHA_LINUX_ARM: ${{ steps.meta.outputs.sha_linux_arm64 }}
        run: |
          mkdir -p tap/Formula
          BASE="https://github.com/${OWNER}/${REPO_NAME}/releases/download/v${VERSION}"
          cat > tap/Formula/agent-memory.rb <<EOF
          class AgentMemory < Formula
            desc "Local-first associative memory store for AI coding agents"
            homepage "https://github.com/${OWNER}/${REPO_NAME}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/agent-memory-macos-arm64.tar.gz"
                sha256 "${SHA_MAC_ARM}"
              else
                url "${BASE}/agent-memory-macos-x86_64.tar.gz"
                sha256 "${SHA_MAC_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/agent-memory-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "${BASE}/agent-memory-linux-x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              # The tarball extracts to ./agent-memory/ — a PyInstaller onedir
              # bundle with the binary alongside its native libs and data files.
              libexec.install Dir["agent-memory/*"]
              bin.install_symlink libexec/"agent-memory"
            end

            test do
              system "#{bin}/agent-memory", "--version"
            end
          end
          EOF

      - name: Commit + push tap
        if: steps.check.outputs.has_token == 'true'
        run: |
          cd tap
          git config user.name "agent-memory release bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add Formula/agent-memory.rb
          git commit -m "agent-memory ${{ steps.meta.outputs.version }}" || echo "no changes to commit"
          git push
